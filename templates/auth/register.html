<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üye Ol — EmareCloud</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            height: 100vh; overflow: hidden;
            background: #0a0a0f;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #e2e8f0;
            display: flex; flex-direction: column;
        }
        .bg-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0; pointer-events: none;
        }
        .bg-glow {
            position: fixed; width: 600px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle, rgba(34,197,94,0.07) 0%, transparent 70%);
            top: -200px; right: -100px; z-index: 0; pointer-events: none;
            animation: slowdrift 22s ease-in-out infinite alternate;
        }
        .bg-glow-2 {
            position: fixed; width: 400px; height: 400px; border-radius: 50%;
            background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 70%);
            bottom: -120px; left: -80px; z-index: 0; pointer-events: none;
            animation: slowdrift 28s ease-in-out infinite alternate-reverse;
        }
        @keyframes slowdrift {
            from { transform: translate(0,0); } to { transform: translate(40px,30px); }
        }
        .chat-header {
            position: relative; z-index: 10;
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.9rem 1.5rem;
            background: rgba(15,15,25,0.85);
            border-bottom: 1px solid rgba(99,102,241,0.12);
            backdrop-filter: blur(12px); flex-shrink: 0;
        }
        .header-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #9333ea);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #fff; position: relative; flex-shrink: 0;
        }
        .header-avatar::after {
            content: ''; position: absolute; bottom: 1px; right: 1px;
            width: 9px; height: 9px; background: #22c55e;
            border-radius: 50%; border: 2px solid #0a0a0f;
        }
        .header-info h2 { font-size: 0.9rem; font-weight: 600; color: #f1f5f9; }
        .header-info span { font-size: 0.72rem; color: #22c55e; }
        .header-brand {
            margin-left: auto; font-size: 0.78rem;
            color: rgba(148,163,184,0.45); font-weight: 500; letter-spacing: 0.04em;
        }
        .step-bar {
            position: relative; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            gap: 0.4rem; padding: 0.6rem 1rem;
            background: rgba(10,10,20,0.7); flex-shrink: 0;
        }
        .step-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(99,102,241,0.25);
            transition: all 0.3s ease;
        }
        .step-dot.active {
            background: #6366f1;
            box-shadow: 0 0 8px rgba(99,102,241,0.6);
            width: 22px; border-radius: 4px;
        }
        .step-dot.done { background: #22c55e; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 1.5rem 1rem;
            position: relative; z-index: 10;
            display: flex; flex-direction: column; gap: 1.1rem;
            max-width: 720px; width: 100%; margin: 0 auto;
            scrollbar-width: thin; scrollbar-color: rgba(99,102,241,0.3) transparent;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 4px; }
        .msg { display: flex; gap: 0.7rem; align-items: flex-end; animation: msgIn 0.3s ease both; }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .msg.user { flex-direction: row-reverse; }
        .msg-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; flex-shrink: 0;
        }
        .msg.ai    .msg-avatar { background: linear-gradient(135deg, #6366f1, #9333ea); color: #fff; }
        .msg.user  .msg-avatar { background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25); color: #818cf8; }
        .msg.error .msg-avatar { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171; }
        .msg-bubble { max-width: 75%; padding: 0.75rem 1rem; border-radius: 16px; font-size: 0.92rem; line-height: 1.6; }
        .msg.ai    .msg-bubble { background: rgba(20,20,40,0.85); border: 1px solid rgba(99,102,241,0.15); border-bottom-left-radius: 4px; color: #e2e8f0; }
        .msg.user  .msg-bubble { background: linear-gradient(135deg, #4f46e5, #7c3aed); border-bottom-right-radius: 4px; color: #fff; }
        .msg.error .msg-bubble { background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.18); border-bottom-left-radius: 4px; color: #f87171; }
        .typing-indicator { display: flex; gap: 0.7rem; align-items: flex-end; animation: msgIn 0.2s ease both; }
        .typing-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #9333ea); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; flex-shrink: 0;
        }
        .typing-dots {
            display: flex; gap: 4px; align-items: center;
            padding: 0.75rem 1rem;
            background: rgba(20,20,40,0.85);
            border: 1px solid rgba(99,102,241,0.15);
            border-radius: 16px; border-bottom-left-radius: 4px;
        }
        .typing-dots span { width: 6px; height: 6px; background: rgba(99,102,241,0.6); border-radius: 50%; animation: dot-bounce 1.2s infinite ease; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30%            { transform: translateY(-5px); opacity: 1; }
        }
        /* Quick-action chips */
        .chips { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.3rem; }
        .chip {
            padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 0.8rem;
            background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.25);
            color: #818cf8; cursor: pointer; transition: all 0.2s;
        }
        .chip:hover { background: rgba(99,102,241,0.2); color: #a5b4fc; }
        /* Password strength */
        .pwd-strength { margin-top: 0.5rem; }
        .pwd-bar {
            height: 4px; border-radius: 2px;
            background: rgba(255,255,255,0.08);
            overflow: hidden; margin-bottom: 0.3rem;
        }
        .pwd-fill {
            height: 100%; border-radius: 2px;
            width: 0%; transition: width 0.4s ease, background 0.4s ease;
        }
        .pwd-rules { display: flex; flex-direction: column; gap: 0.2rem; }
        .pwd-rule { font-size: 0.72rem; display: flex; align-items: center; gap: 0.3rem; color: rgba(148,163,184,0.5); transition: color 0.2s; }
        .pwd-rule.ok { color: #22c55e; }
        .pwd-rule i { font-size: 0.65rem; }
        /* Input area */
        .chat-input-area {
            position: relative; z-index: 10; padding: 1rem;
            background: rgba(10,10,20,0.92);
            border-top: 1px solid rgba(99,102,241,0.1);
            backdrop-filter: blur(12px); flex-shrink: 0;
        }
        .input-label { text-align: center; font-size: 0.7rem; color: rgba(148,163,184,0.4); margin-bottom: 0.45rem; letter-spacing: 0.03em; }
        .chat-input-wrap { max-width: 720px; margin: 0 auto; display: flex; gap: 0.6rem; align-items: center; }
        .chat-input-box {
            flex: 1; background: rgba(20,20,40,0.9);
            border: 1px solid rgba(99,102,241,0.2); border-radius: 12px;
            padding: 0.7rem 1rem; color: #e2e8f0; font-size: 0.92rem;
            font-family: inherit; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .chat-input-box:focus { border-color: rgba(99,102,241,0.5); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .chat-input-box::placeholder { color: rgba(148,163,184,0.35); }
        .chat-input-box[type="password"] { letter-spacing: 0.12em; }
        .chat-send-btn {
            width: 42px; height: 42px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, #6366f1, #9333ea);
            color: #fff; font-size: 0.9rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .chat-send-btn:hover { opacity: 0.85; transform: scale(1.05); }
        .chat-send-btn:active { transform: scale(0.95); }
        .chat-send-btn:disabled { opacity: 0.35; cursor: default; transform: none; }
        #actual-form { display: none; }
        .submit-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(10,10,20,0.75); z-index: 100;
            align-items: center; justify-content: center;
            flex-direction: column; gap: 1rem; backdrop-filter: blur(8px);
        }
        .submit-overlay.active { display: flex; }
        .spin-ring { width: 48px; height: 48px; border: 3px solid rgba(99,102,241,0.2); border-top-color: #6366f1; border-radius: 50%; animation: spin 0.9s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .submit-overlay p { font-size: 0.88rem; color: rgba(148,163,184,0.7); }
        .login-link {
            text-align: center; font-size: 0.78rem;
            color: rgba(148,163,184,0.45); margin-top: 0.5rem;
        }
        .login-link a { color: #818cf8; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="chat-header">
        <div class="header-avatar"><i class="fas fa-robot"></i></div>
        <div class="header-info">
            <h2>Emare</h2>
            <span><i class="fas fa-circle" style="font-size:0.45rem;"></i> Çevrimiçi</span>
        </div>
        <div class="header-brand">EmareCloud</div>
    </div>

    <!-- Step indicator: 4 adım: kullanıcı adı, e-posta, şifre, onay -->
    <div class="step-bar" id="step-bar">
        <div class="step-dot active" id="dot-0"></div>
        <div class="step-dot"        id="dot-1"></div>
        <div class="step-dot"        id="dot-2"></div>
        <div class="step-dot"        id="dot-3"></div>
    </div>

    <div class="chat-messages" id="chat-messages"></div>

    <div class="chat-input-area">
        <div class="input-label" id="input-label">Hazırlanıyor…</div>
        <div class="chat-input-wrap">
            <input class="chat-input-box" id="chat-input"
                   type="text" placeholder=""
                   autocomplete="off" autocorrect="off"
                   autocapitalize="off" spellcheck="false">
            <button class="chat-send-btn" id="send-btn" type="button" disabled>
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
        <div class="login-link">Zaten hesabın var mı? <a href="{{ url_for('auth.login') }}">Giriş Yap</a></div>
    </div>

    <form id="actual-form" method="POST" action="{{ url_for('auth.register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="username"  id="form-username">
        <input type="hidden" name="email"     id="form-email">
        <input type="hidden" name="password"  id="form-password">
        <input type="hidden" name="password2" id="form-password2">
    </form>

    <div class="submit-overlay" id="submit-overlay">
        <div class="spin-ring"></div>
        <p>Hesabnz oluturuluyor…</p>
    </div>

    <div id="server-errors" style="display:none;"
         data-errors="{{ get_flashed_messages(with_categories=true)|tojson }}"></div>

    <script>
    (function () {
        var msgsEl  = document.getElementById('chat-messages');
        var inputEl = document.getElementById('chat-input');
        var sendBtn = document.getElementById('send-btn');
        var labelEl = document.getElementById('input-label');
        var overlay = document.getElementById('submit-overlay');
        var dots    = [
            document.getElementById('dot-0'),
            document.getElementById('dot-1'),
            document.getElementById('dot-2'),
            document.getElementById('dot-3'),
        ];

        // Steps: 0=username, 1=email, 2=password, 3=password2
        var step = 0;
        var data = { username: '', email: '', password: '', password2: '' };

        var PWD_RULES = [
            { re: /.{8,}/,                  label: 'En az 8 karakter' },
            { re: /[A-Z]/,                  label: 'En az 1 büyük harf' },
            { re: /[a-z]/,                  label: 'En az 1 küçük harf' },
            { re: /[0-9]/,                  label: 'En az 1 rakam' },
            { re: /[!@#$%^&*()\_+\-=\[\]{}|;:,.<>?\/~`]/, label: 'En az 1 özel karakter' },
        ];

        function esc(s) {
            return String(s)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function scroll() { msgsEl.scrollTop = msgsEl.scrollHeight; }

        function setDot(idx) {
            for (var i = 0; i < dots.length; i++) {
                dots[i].className = 'step-dot' + (i < idx ? ' done' : i === idx ? ' active' : '');
            }
        }

        function addMsg(role, html) {
            var wrap = document.createElement('div');
            wrap.className = 'msg ' + role;
            var av = document.createElement('div');
            av.className = 'msg-avatar';
            av.innerHTML = role === 'user'
                ? '<i class="fas fa-user"></i>'
                : role === 'error'
                    ? '<i class="fas fa-exclamation-triangle"></i>'
                    : '<i class="fas fa-robot"></i>';
            var bub = document.createElement('div');
            bub.className = 'msg-bubble';
            bub.innerHTML = html;
            if (role === 'user') { wrap.appendChild(bub); wrap.appendChild(av); }
            else                 { wrap.appendChild(av);  wrap.appendChild(bub); }
            msgsEl.appendChild(wrap);
            scroll();
            return { wrap: wrap, bubble: bub };
        }

        function showTyping() {
            var wrap = document.createElement('div');
            wrap.className = 'typing-indicator'; wrap.id = 'typing-el';
            wrap.innerHTML =
                '<div class="typing-avatar"><i class="fas fa-robot"></i></div>' +
                '<div class="typing-dots"><span></span><span></span><span></span></div>';
            msgsEl.appendChild(wrap); scroll();
        }

        function hideTyping() { var t = document.getElementById('typing-el'); if (t) t.remove(); }

        function aiSay(html, preDelay) {
            preDelay = (preDelay === undefined) ? 500 : preDelay;
            return new Promise(function (resolve) {
                setTimeout(function () {
                    showTyping();
                    var readTime = Math.min(1300, 300 + html.replace(/<[^>]*>/g,'').length * 20);
                    setTimeout(function () { hideTyping(); addMsg('ai', html); resolve(); }, readTime);
                }, preDelay);
            });
        }

        function setReady(placeholder, label, type) {
            inputEl.type        = type || 'text';
            inputEl.placeholder = placeholder;
            inputEl.value       = '';
            inputEl.disabled    = false;
            sendBtn.disabled    = false;
            labelEl.textContent = label;
            setTimeout(function () { inputEl.focus(); }, 50);
        }

        function setWaiting() { inputEl.disabled = true; sendBtn.disabled = true; }

        function getFlashErrors() {
            try { return JSON.parse(document.getElementById('server-errors').dataset.errors) || []; }
            catch (e) { return []; }
        }

        /* ── Password strength widget appended into a bubble ── */
        function addPwdStrength(parentBubble) {
            var div = document.createElement('div');
            div.className = 'pwd-strength'; div.id = 'pwd-strength';
            div.innerHTML =
                '<div class="pwd-bar"><div class="pwd-fill" id="pwd-fill"></div></div>' +
                '<div class="pwd-rules" id="pwd-rules"></div>';
            parentBubble.appendChild(div);
            redrawRules('');
        }

        function redrawRules(pwd) {
            var rulesEl = document.getElementById('pwd-rules');
            if (!rulesEl) return;
            var ok = 0;
            var html = '';
            for (var i = 0; i < PWD_RULES.length; i++) {
                var pass = PWD_RULES[i].re.test(pwd);
                if (pass) ok++;
                html += '<div class="pwd-rule' + (pass ? ' ok' : '') + '">' +
                    '<i class="fas fa-' + (pass ? 'check' : 'times') + '"></i>' +
                    esc(PWD_RULES[i].label) + '</div>';
            }
            rulesEl.innerHTML = html;
            var pct = (ok / PWD_RULES.length) * 100;
            var fill = document.getElementById('pwd-fill');
            if (fill) {
                fill.style.width = pct + '%';
                fill.style.background = ok <= 1 ? '#ef4444' : ok <= 3 ? '#f59e0b' : '#22c55e';
            }
        }

        function pwdAllOk(pwd) {
            for (var i = 0; i < PWD_RULES.length; i++) {
                if (!PWD_RULES[i].re.test(pwd)) return false;
            }
            return true;
        }

        /* ── Greeting ── */
        async function greet() {
            setWaiting();
            labelEl.textContent = 'Lütfen bekleyin…';
            await aiSay('Merhaba! 🎉 Aramıza katıldığınız için mutluyuz.', 500);
            await aiSay('Size bir hesap oluşturalım. Birkaç basit soru soralım.', 100);

            var errors = getFlashErrors();
            if (errors.length) {
                for (var i = 0; i < errors.length; i++) { addMsg('error', esc(errors[i][1])); scroll(); }
                await aiSay('Bir sorun oluştu. Tekrar başlamak ister misiniz?', 200);
            }

            await askUsername();
        }

        async function askUsername() {
            step = 0; setDot(0);
            await aiSay('Kullanmak istediğiniz <strong>kullanıcı adını</strong> nedir?<br><small style="opacity:.5">En az 3 karakter, boşluk olmadan.</small>', 200);
            setReady('kullanici_adi', 'Kullanıcı adınızı yazın', 'text');
        }

        async function askEmail() {
            step = 1; setDot(1);
            var res = addMsg('ai', '<strong>E-posta adresiniz</strong> nedir? (isteğe bağlı)');
            var chips = document.createElement('div');
            chips.className = 'chips';
            chips.innerHTML = '<div class="chip" id="skip-email"><i class="fas fa-forward" style="margin-right:.3rem"></i>Atla</div>';
            res.bubble.appendChild(chips);
            scroll();
            document.getElementById('skip-email').addEventListener('click', function () {
                data.email = '';
                addMsg('user', '<span style="opacity:.6"><em>Atlandı</em></span>');
                askPassword();
            });
            setReady('ornek@eposta.com', 'E-posta veya Enter ile atla', 'text');
        }

        async function askPassword() {
            step = 2; setDot(2);
            var res = addMsg('ai', '<strong>Şifrenizi</strong> belirleyin:');
            addPwdStrength(res.bubble);
            scroll();
            setReady('••••••••', 'Şifrenizi yazın', 'password');
        }

        async function askConfirm() {
            step = 3; setDot(3);
            await aiSay('Şifrenizi bir kez daha girin:', 200);
            setReady('••••••••', 'Şifrenizi tekrar yazın', 'password');
        }

        /* ── Handle send ── */
        async function handleSend() {
            var val = inputEl.value.trim();

            if (step === 0) {
                if (!val || val.length < 3) { inputEl.classList.add('error'); setTimeout(function(){inputEl.classList.remove('error');},600); return; }
                data.username = val;
                addMsg('user', esc(val));
                setWaiting();
                await askEmail();

            } else if (step === 1) {
                data.email = val; // boş olabilir
                if (val) {
                    addMsg('user', esc(val));
                } else {
                    addMsg('user', '<span style="opacity:.6"><em>Atlandı</em></span>');
                }
                setWaiting();
                await askPassword();

            } else if (step === 2) {
                if (!val) return;
                if (!pwdAllOk(val)) {
                    redrawRules(val);
                    inputEl.value = '';
                    inputEl.focus();
                    return;
                }
                data.password = val;
                addMsg('user', '&bull;'.repeat(Math.min(val.length, 10)));
                setWaiting();
                await askConfirm();

            } else if (step === 3) {
                if (!val) return;
                if (val !== data.password) {
                    addMsg('error', 'Şifreler eşleşmiyor. Tekrar dene:');
                    inputEl.value = ''; inputEl.focus();
                    return;
                }
                data.password2 = val;
                addMsg('user', '&bull;'.repeat(Math.min(val.length, 10)));
                setWaiting();
                dots.forEach(function(d) { d.className = 'step-dot done'; });
                await aiSay('Harika! Her şey hazır. Hesabınız oluşturuluyor… 🎉', 200);
                document.getElementById('form-username').value  = data.username;
                document.getElementById('form-email').value     = data.email;
                document.getElementById('form-password').value  = data.password;
                document.getElementById('form-password2').value = data.password2;
                overlay.classList.add('active');
                setTimeout(function () { document.getElementById('actual-form').submit(); }, 700);
            }
        }

        /* ── Live password strength while typing ── */
        inputEl.addEventListener('input', function () {
            if (step === 2) redrawRules(inputEl.value);
        });

        sendBtn.addEventListener('click', handleSend);
        inputEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') { e.preventDefault(); handleSend(); }
        });

        greet();
    }());
    </script>
</body>
</html>
