name: "AI Lock Guard"

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-lock-guard:
    name: "AI Lock Cakisma Kontrolu"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run lock guard
        id: lockcheck
        run: |
          python tools/check_ai_locks.py \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Warn on PR if conflict
        if: steps.lockcheck.outputs.conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ai-lock-guard -->';
            const body = `${marker}
            ## AI Lock Guard Uyarisi
            Bu PR, aktif lock altindaki dosyalara dokunuyor.

            Lutfen su adimlari takip edin:
            - Lock sahibi AI ile slot/planning senkronu yapin.
            - Gerekirse lock devri alin ve lock dosyasini guncelleyin.
            - Handoff notunu PR aciklamasina ekleyin.

            Ayrinti icin job ozetine bakin.`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
