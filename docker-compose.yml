version: '3.8'

services:
  emarecloud:
    build: .
    container_name: emarecloud
    ports:
      - "${PORT:-5555}:5555"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-changeme_in_production}
      - MASTER_KEY=${MASTER_KEY:-changeme_in_production}
      - DEFAULT_ADMIN_USERNAME=${DEFAULT_ADMIN_USERNAME:-admin}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-admin123}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@emarecloud.com}
      - DATABASE_URL=${DATABASE_URL:-}
      - SSH_TIMEOUT=${SSH_TIMEOUT:-10}
    volumes:
      - emarecloud_data:/app/instance
      - ./config.json:/app/config.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5555/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  emarecloud_data:
    driver: local
