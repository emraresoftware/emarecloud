services:
  firewall:
    build: .
    container_name: emarefirewall-demo
    ports:
      - "5555:5555"
    volumes:
      - ./templates:/app/templates
    restart: unless-stopped
    environment:
      - EMARE_MODE=standalone
      - EMARE_CACHE=dict
      - EMARE_DB=sqlite
    deploy:
      resources:
        limits:
          memory: 200M
          cpus: '0.8'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5555/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
